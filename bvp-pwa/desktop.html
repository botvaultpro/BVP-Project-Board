<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVP — Project Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--bg2:#0d1017;--bg3:#141820;--bg4:#1a2030;--border:#1e2433;
  --blue:#00a8ff;--blue-dim:rgba(0,168,255,0.10);--blue-glow:rgba(0,168,255,0.22);
  --green:#00e676;--green-dim:rgba(0,230,118,0.10);
  --yellow:#ffd740;--yellow-dim:rgba(255,215,64,0.10);
  --purple:#b388ff;--purple-dim:rgba(179,136,255,0.10);
  --coral:#ff6e6e;--coral-dim:rgba(255,110,110,0.10);
  --text1:#e8eaf0;--text2:#7a8599;--text3:#3d4659;--radius:10px;
}
html,body{background:var(--bg);color:var(--text1);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── LOCK SCREEN ── */
#lockScreen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;}
#lockScreen.hidden{display:none;}
.lock-box{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:40px 44px;width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:24px;}
.lock-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;letter-spacing:.1em;text-transform:uppercase;}
.lock-logo span{color:var(--blue);}
.lock-subtitle{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.lock-icon{font-size:38px;margin:-4px 0;}
.lock-field{width:100%;display:flex;flex-direction:column;gap:8px;}
.lock-field label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);text-align:center;}
.lock-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-family:'Barlow',sans-serif;font-size:15px;padding:12px 16px;outline:none;text-align:center;letter-spacing:.15em;transition:border-color .15s;}
.lock-field input:focus{border-color:var(--blue);}
.lock-field input.err{border-color:var(--coral);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.lock-btn{width:100%;background:var(--blue);border:none;border-radius:10px;color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.1em;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .15s;}
.lock-btn:hover{background:#33baff;}
.lock-err{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--coral);text-align:center;min-height:16px;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:90;gap:14px;flex-wrap:wrap;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.logo span{color:var(--blue);}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-left:4px;}
.toolbar{display:flex;align-items:center;gap:8px;flex:1;min-width:0;justify-content:flex-end;flex-wrap:wrap;}

.search-wrap{position:relative;}
.search-wrap input{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text1);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 11px 7px 32px;outline:none;width:190px;transition:border-color .15s,width .2s;}
.search-wrap input:focus{border-color:var(--blue);width:230px;}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;}

.filter-group{display:flex;align-items:center;gap:4px;}
.filter-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-pill:hover{color:var(--text1);border-color:var(--text2);}
.filter-pill.active{background:var(--blue-dim);border-color:rgba(0,168,255,.4);color:var(--blue);}
.filter-pill.fp-high.active{background:var(--coral-dim);border-color:rgba(255,110,110,.4);color:var(--coral);}
.filter-pill.fp-med.active{background:var(--yellow-dim);border-color:rgba(255,215,64,.4);color:var(--yellow);}
.filter-pill.fp-low.active{background:var(--green-dim);border-color:rgba(0,230,118,.4);color:var(--green);}
.filter-sep{width:1px;height:18px;background:var(--border);margin:0 2px;}

.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:#000;}
.btn-primary:hover{background:#33baff;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text1);border-color:var(--text2);}
.btn-danger{background:var(--coral-dim);color:var(--coral);border:1px solid rgba(255,110,110,.25);}
.btn-danger:hover{background:var(--coral);color:#000;}
.btn-sm{padding:5px 10px;font-size:11px;}
.icon-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text2);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s;}
.icon-btn:hover{color:var(--text1);border-color:var(--text2);}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:5px;padding:9px 26px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;align-items:center;}
.stat-pill{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;color:var(--text2);}
.stat-dot{width:6px;height:6px;border-radius:50%;}
.stat-count{color:var(--text1);}
.overdue-badge{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--coral);background:var(--coral-dim);border:1px solid rgba(255,110,110,.25);padding:3px 9px;border-radius:5px;flex-shrink:0;}

/* ── BOARD ── */
.board-wrap{overflow-x:auto;padding:18px 26px 40px;min-height:calc(100vh - 130px);}
.board{display:flex;gap:13px;min-width:max-content;align-items:flex-start;}
.no-results{display:none;padding:60px 28px;text-align:center;color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:.08em;text-transform:uppercase;}

/* ── COLUMNS ── */
.col{width:282px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 170px);}
.col-header{padding:12px 13px 10px;border-bottom:1px solid var(--border);border-top:3px solid transparent;border-radius:11px 11px 0 0;display:flex;align-items:center;justify-content:space-between;}
.col-title-row{display:flex;align-items:center;gap:7px;}
.col-dot{width:8px;height:8px;border-radius:50%;}
.col-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.col-count{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:20px;}
.col-add{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;line-height:1;padding:0 2px;transition:color .15s;}
.col-add:hover{color:var(--blue);}
.col-cards{flex:1;overflow-y:auto;padding:9px 7px;display:flex;flex-direction:column;gap:8px;}
.col-cards::-webkit-scrollbar{width:3px;}
.col-cards::-webkit-scrollbar-track{background:transparent;}
.col-cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.s-idea .col-header{border-top-color:var(--text3);}
.s-idea .col-dot{background:var(--text3);}
.s-idea .col-title{color:var(--text2);}
.s-planned .col-header{border-top-color:var(--purple);}
.s-planned .col-dot{background:var(--purple);}
.s-planned .col-title{color:var(--purple);}
.s-active .col-header{border-top-color:var(--blue);}
.s-active .col-dot{background:var(--blue);box-shadow:0 0 8px var(--blue);}
.s-active .col-title{color:var(--blue);}
.s-review .col-header{border-top-color:var(--yellow);}
.s-review .col-dot{background:var(--yellow);}
.s-review .col-title{color:var(--yellow);}
.s-done .col-header{border-top-color:var(--green);}
.s-done .col-dot{background:var(--green);box-shadow:0 0 8px var(--green);}
.s-done .col-title{color:var(--green);}
.s-paused .col-header{border-top-color:var(--coral);}
.s-paused .col-dot{background:var(--coral);}
.s-paused .col-title{color:var(--coral);}

/* ── CARDS ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px;cursor:pointer;transition:border-color .18s,transform .15s,box-shadow .18s;position:relative;}
.card:hover{border-color:#2e3a52;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.card.overdue{border-left:2px solid var(--coral);}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;color:var(--text1);margin-bottom:5px;line-height:1.3;padding-right:46px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1px solid transparent;}
.card-excerpt{font-size:11px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px;}
.progress-wrap{margin-bottom:7px;}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.progress-pct{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--text3);}
.progress-bar-bg{height:3px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.card-quick-actions{position:absolute;top:8px;right:8px;display:flex;gap:3px;opacity:0;transition:opacity .15s;}
.card:hover .card-quick-actions{opacity:1;}
.qmove-btn{background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:11px;cursor:pointer;padding:2px 5px;line-height:1.4;transition:all .15s;}
.qmove-btn:hover{background:var(--blue-dim);border-color:rgba(0,168,255,.3);color:var(--blue);}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid var(--border);}
.card-due{font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em;font-weight:700;}
.card-due.overdue-text{color:var(--coral);}
.card-due.due-soon{color:var(--yellow);}
.card-due.due-ok{color:var(--text3);}
.card-priority{font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px;}
.pri-high{background:rgba(255,110,110,.15);color:var(--coral);}
.pri-med{background:rgba(255,215,64,.12);color:var(--yellow);}
.pri-low{background:rgba(0,230,118,.10);color:var(--green);}
.pri-none{background:var(--bg4);color:var(--text3);}
.has-notes-dot{position:absolute;top:8px;right:32px;width:5px;height:5px;border-radius:50%;background:var(--blue);}
.col-empty{text-align:center;padding:20px 10px;color:var(--text3);font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;}

/* ── OVERLAYS ── */
.ov{display:none;position:fixed;inset:0;background:rgba(7,9,15,.85);z-index:200;align-items:flex-start;justify-content:center;padding:32px 18px;overflow-y:auto;}
.ov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:600px;overflow:hidden;animation:slideUp .2s ease;}
.modal.modal-sm{max-width:460px;}
@keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
.modal-close{background:none;border:none;color:var(--text2);font-size:19px;cursor:pointer;line-height:1;padding:2px 5px;border-radius:4px;transition:color .15s,background .15s;}
.modal-close:hover{color:var(--text1);background:var(--bg4);}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:13px;}
.modal-footer{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end;align-items:center;}

/* ── SETTINGS ── */
.settings-section{display:flex;flex-direction:column;gap:6px;}
.settings-section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding-bottom:6px;border-bottom:1px solid var(--border);}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;}
.settings-row-label{font-size:13px;color:var(--text2);font-family:'Barlow',sans-serif;}
.settings-row input{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text1);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s;flex:1;min-width:0;}
.settings-row input:focus{border-color:var(--blue);}
.settings-row input.locked{background:var(--bg4);color:var(--text3);cursor:not-allowed;border-color:var(--border);}
.settings-prefix{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--text1);flex-shrink:0;background:var(--bg4);border:1px solid var(--border);border-right:none;border-radius:7px 0 0 7px;padding:7px 10px;}
.settings-row .with-prefix input{border-radius:0 7px 7px 0;}
.col-label-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.col-label-item{display:flex;flex-direction:column;gap:4px;}
.col-label-item label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
.col-label-item input{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text1);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;padding:7px 10px;outline:none;transition:border-color .15s;width:100%;}
.col-label-item input:focus{border-color:var(--blue);}
.pw-group{display:flex;flex-direction:column;gap:8px;width:100%;}
.pw-hint{font-size:11px;color:var(--text3);font-family:'Barlow',sans-serif;}

/* ── FORM FIELDS ── */
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text2);}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text1);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);}
.field input[type="date"]{color-scheme:dark;}
.field textarea{resize:vertical;min-height:76px;line-height:1.55;}
.field select option{background:var(--bg3);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}

/* ── SUGGESTIONS ── */
.suggest-section{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.suggest-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg4);}
.suggest-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);}
.suggest-list{padding:8px 12px;display:flex;flex-direction:column;gap:5px;}
.suggest-item{display:flex;align-items:flex-start;gap:7px;padding:6px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text2);line-height:1.45;}
.suggest-item-check{width:14px;height:14px;border:1px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;}
.suggest-item-check.done{background:var(--green);border-color:var(--green);color:#000;}
.suggest-item-text{flex:1;}
.suggest-item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0 2px;line-height:1;transition:color .15s;flex-shrink:0;}
.suggest-item-del:hover{color:var(--coral);}
.suggest-add-row{display:flex;gap:7px;padding:0 12px 10px;}
.suggest-add-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text1);font-family:'Barlow',sans-serif;font-size:12px;padding:6px 9px;outline:none;transition:border-color .15s;}
.suggest-add-row input:focus{border-color:var(--blue);}
.suggest-add-row input::placeholder{color:var(--text3);}
.suggest-add-btn{background:var(--blue-dim);border:1px solid rgba(0,168,255,.25);border-radius:6px;color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 11px;cursor:pointer;transition:all .15s;}
.suggest-add-btn:hover{background:var(--blue);color:#000;}
.ai-suggest-btn{background:linear-gradient(135deg,rgba(0,168,255,.15),rgba(179,136,255,.15));border:1px solid rgba(0,168,255,.3);border-radius:6px;color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:5px 10px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;}
.ai-suggest-btn:hover{background:linear-gradient(135deg,rgba(0,168,255,.28),rgba(179,136,255,.28));}
.ai-suggest-btn.loading{opacity:.6;pointer-events:none;}
.ai-spinner{width:9px;height:9px;border:1.5px solid rgba(0,168,255,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:none;}
.ai-suggest-btn.loading .ai-spinner{display:block;}

/* ── DETAIL ── */
.detail-status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.detail-notes{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px 14px;font-size:13px;line-height:1.65;color:var(--text2);white-space:pre-wrap;min-height:48px;}
.detail-meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.detail-prog-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:11px 13px;}
.detail-prog-bg{height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:7px;}
.detail-prog-fill{height:100%;border-radius:4px;transition:width .4s;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg2);border:1px solid var(--border);color:var(--text1);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 18px;border-radius:7px;z-index:9999;box-shadow:0 6px 24px rgba(0,0,0,.6);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-logo">BVP <span>/</span> <span id="lockSubtitle">Project Board</span></div>
    <div class="lock-icon">🔒</div>
    <div class="lock-subtitle">Enter password to continue</div>
    <div class="lock-field">
      <label>Password</label>
      <input type="password" id="lockInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryUnlock()">
    </div>
    <div class="lock-err" id="lockErr"></div>
    <button class="lock-btn" onclick="tryUnlock()">Unlock</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
  <div style="display:flex;align-items:baseline;gap:8px;">
    <div class="logo">BVP <span>/</span> <span id="headerSubtitle">Project Board</span></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search… (⌘K)" oninput="applyFilters()">
    </div>
    <div class="filter-group">
      <button class="filter-pill fp-high" data-filter="pri:high" onclick="toggleFilter(this)">● High</button>
      <button class="filter-pill fp-med"  data-filter="pri:med"  onclick="toggleFilter(this)">◐ Med</button>
      <button class="filter-pill fp-low"  data-filter="pri:low"  onclick="toggleFilter(this)">○ Low</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" id="tagFilters"></div>
    <div class="filter-sep"></div>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">↓ Export</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()">↑ Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <div class="icon-btn" onclick="openOv('settingsOv')" title="Settings">⚙</div>
    <div class="icon-btn" onclick="lockApp()" title="Lock">🔒</div>
    <button class="btn btn-primary" onclick="openNew()">+ New Project</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="board-wrap">
  <div class="board" id="board"></div>
  <div class="no-results" id="noResults">No projects match your search</div>
</div>

</div><!-- /app -->

<!-- SETTINGS MODAL -->
<div class="ov" id="settingsOv" onclick="if(event.target===this)closeOv('settingsOv')">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">⚙ Settings</div>
      <button class="modal-close" onclick="closeOv('settingsOv')">✕</button>
    </div>
    <div class="modal-body">

      <!-- TITLE -->
      <div class="settings-section">
        <div class="settings-section-title">Board Title</div>
        <div class="settings-row">
          <div style="display:flex;align-items:center;gap:0;flex:1;">
            <div class="settings-prefix">BVP /</div>
            <input type="text" id="sTitleSub" placeholder="Project Board" style="border-radius:0 7px 7px 0;flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text1);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s;" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
          </div>
        </div>
        <div style="font-size:11px;color:var(--text3);font-family:'Barlow',sans-serif;">"BVP /" is locked and cannot be changed.</div>
      </div>

      <!-- COLUMNS -->
      <div class="settings-section">
        <div class="settings-section-title">Column Titles</div>
        <div class="col-label-grid" id="colLabelGrid"></div>
      </div>

      <!-- PASSWORD -->
      <div class="settings-section">
        <div class="settings-section-title">Change Password</div>
        <div class="pw-group">
          <input type="password" id="sPwCurrent" placeholder="Current password" style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text1);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;width:100%;" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
          <input type="password" id="sPwNew" placeholder="New password" style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text1);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;width:100%;" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
          <input type="password" id="sPwConfirm" placeholder="Confirm new password" style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text1);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;width:100%;" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
          <div class="pw-hint" id="sPwHint"></div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeOv('settingsOv')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="ov" id="editOv" onclick="if(event.target===this)closeOv('editOv')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editModalTitle">New Project</div>
      <button class="modal-close" onclick="closeOv('editOv')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Project Title</label>
        <input type="text" id="fTitle" placeholder="What are you building?">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Status</label>
          <select id="fStatus">
            <option value="idea">💡 Idea</option>
            <option value="planned">📋 Planned</option>
            <option value="active">🚀 Active</option>
            <option value="review">🔍 In Review</option>

            <option value="paused">⏸ Paused</option>
          </select>

          <label>Priority</label>

          <label>Due Date</label>
          <input type="date" id="fDue">
        </div>
      </div>
      <div class="field">
        <label>Tags (comma separated)</label>
        <input type="text" id="fTags" placeholder="e.g. AI Tool, Revenue, Partnership">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Goals, context, links, ideas..."></textarea>
      </div>
      <div class="suggest-section">
        <div class="suggest-header">
          <div class="suggest-label">⚡ Progression Steps</div>
          <button class="ai-suggest-btn" id="aiBtn" onclick="getAISuggestions()">
            <div class="ai-spinner" id="aiSpinner"></div>
            <span id="aiBtnText">✦ AI Suggest</span>
          </button>
        </div>
        <div class="suggest-list" id="suggestList"></div>
        <div class="suggest-add-row">
          <input type="text" id="suggestInput" placeholder="Add a next step..." onkeydown="if(event.key==='Enter')addSuggest()">
          <button class="suggest-add-btn" onclick="addSuggest()">Add</button>
        </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteProject()" style="margin-right:auto;display:none;">Delete</button>
      <button class="btn btn-ghost" onclick="closeOv('editOv')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save Project</button>

  </div>
</div>

<!-- DETAIL MODAL -->
<div class="ov" id="detailOv" onclick="if(event.target===this)closeOv('detailOv')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detailName" style="font-size:17px;text-transform:none;letter-spacing:.01em;font-weight:700"></div>
      <button class="modal-close" onclick="closeOv('detailOv')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeOv('detailOv')">Close</button>
      <button class="btn btn-primary" onclick="editFromDetail()">Edit</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ─── DEFAULTS ─── */
const DEFAULT_PASSWORD = 'bvp2025';
const COLUMNS_DEF = [
  {id:'idea',   label:'Ideas'},
  {id:'planned',label:'Planned'},
  {id:'active', label:'Active'},
  {id:'review', label:'In Review'},
  {id:'done',   label:'Done'},
  {id:'paused', label:'Paused'},
];
const SC={idea:{color:'#3d4659',bg:'rgba(61,70,89,0.2)'},planned:{color:'#b388ff',bg:'rgba(179,136,255,0.12)'},active:{color:'#00a8ff',bg:'rgba(0,168,255,0.12)'},review:{color:'#ffd740',bg:'rgba(255,215,64,0.12)'},done:{color:'#00e676',bg:'rgba(0,230,118,0.12)'},paused:{color:'#ff6e6e',bg:'rgba(255,110,110,0.12)'}};
const PC={idea:'#3d4659',planned:'#b388ff',active:'#00a8ff',review:'#ffd740',done:'#00e676',paused:'#ff6e6e'};
const TC=[{bg:'rgba(0,168,255,0.12)',border:'rgba(0,168,255,0.3)',text:'#00a8ff'},{bg:'rgba(179,136,255,0.12)',border:'rgba(179,136,255,0.3)',text:'#b388ff'},{bg:'rgba(0,230,118,0.12)',border:'rgba(0,230,118,0.3)',text:'#00e676'},{bg:'rgba(255,215,64,0.12)',border:'rgba(255,215,64,0.3)',text:'#ffd740'},{bg:'rgba(255,110,110,0.12)',border:'rgba(255,110,110,0.3)',text:'#ff6e6e'}];

const KEY_DATA     = 'bvp_projects_v2';
const KEY_SETTINGS = 'bvp_settings_v1';
const KEY_SESSION  = 'bvp_session_v1';

/* ─── STATE ─── */
let projects=[], editingId=null, viewingId=null, suggestions=[], activeFilters=new Set();
let settings = { password: DEFAULT_PASSWORD, subtitle: 'Project Board', colLabels: {} };
let COLUMNS = [...COLUMNS_DEF.map(c=>({...c}))];

/* ─── LOAD SETTINGS ─── */
function loadSettings(){
  try{
    const r=localStorage.getItem(KEY_SETTINGS);
    if(r){ const s=JSON.parse(r); settings={...settings,...s}; }
  }catch(e){}
  // Apply column label overrides
  COLUMNS = COLUMNS_DEF.map(c=>({ id:c.id, label: settings.colLabels?.[c.id] || c.label }));
}

function saveSettings_(){
  try{ localStorage.setItem(KEY_SETTINGS, JSON.stringify(settings)); }catch(e){}
}

/* ─── SESSION ─── */
let _unlocked = false;
function isUnlocked(){
  try{ return sessionStorage.getItem(KEY_SESSION)==='1'; }catch(e){ return _unlocked; }
}
function setSession(v){
  _unlocked = !!v;
  try{ if(v)sessionStorage.setItem(KEY_SESSION,'1'); else sessionStorage.removeItem(KEY_SESSION); }catch(e){}
}

function tryUnlock(){
  const val = document.getElementById('lockInput').value;
  const inp = document.getElementById('lockInput');
  const err = document.getElementById('lockErr');
  if(val === settings.password){
    err.textContent='';
    setSession(true);
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').style.display='block';
    inp.value='';
  } else {
    err.textContent='Incorrect password';
    inp.classList.add('err');
    inp.value='';
    setTimeout(()=>inp.classList.remove('err'),400);
  }
}

function lockApp(){
  setSession(false);
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('app').style.display='none';
  document.getElementById('lockInput').value='';
  document.getElementById('lockErr').textContent='';
  // close all modals
  ['editOv','detailOv','settingsOv'].forEach(id=>closeOv(id));
}

function applyBranding(){
  const sub = settings.subtitle || 'Project Board';
  document.getElementById('headerSubtitle').textContent = sub;
  document.getElementById('lockSubtitle').textContent   = sub;
  document.title = 'BVP — ' + sub;
}

/* ─── SETTINGS MODAL ─── */
function openOv_settings(){
  // populate fields
  document.getElementById('sTitleSub').value = settings.subtitle || 'Project Board';
  document.getElementById('sPwCurrent').value='';
  document.getElementById('sPwNew').value='';
  document.getElementById('sPwConfirm').value='';
  document.getElementById('sPwHint').textContent='';
  // col labels grid
  const grid = document.getElementById('colLabelGrid');
  grid.innerHTML = COLUMNS_DEF.map(function(c){
    var lbl = (settings.colLabels && settings.colLabels[c.id]) || c.label;
    return '<div class="col-label-item"><label>'+c.label+'</label><input type="text" data-col="'+c.id+'" value="'+esc(lbl)+'" placeholder="'+c.label+'"></div>';
  }).join('');
  document.getElementById('settingsOv').classList.add('open');
}

function saveSettings(){
  // Title
  const newSub = document.getElementById('sTitleSub').value.trim() || 'Project Board';
  settings.subtitle = newSub;

  // Column labels
  document.querySelectorAll('#colLabelGrid input[data-col]').forEach(inp=>{
    const id = inp.dataset.col;
    const val = inp.value.trim();
    const def = COLUMNS_DEF.find(c=>c.id===id)?.label||id;
    if(val && val !== def) settings.colLabels[id] = val;
    else delete settings.colLabels[id];
  });

  // Password
  const cur = document.getElementById('sPwCurrent').value;
  const nw  = document.getElementById('sPwNew').value;
  const cf  = document.getElementById('sPwConfirm').value;
  const hint = document.getElementById('sPwHint');

  if(cur || nw || cf){
    if(cur !== settings.password){ hint.style.color='var(--coral)'; hint.textContent='Current password is incorrect.'; return; }
    if(!nw){ hint.style.color='var(--coral)'; hint.textContent='New password cannot be empty.'; return; }
    if(nw !== cf){ hint.style.color='var(--coral)'; hint.textContent='New passwords do not match.'; return; }
    settings.password = nw;
  }

  saveSettings_();
  COLUMNS = COLUMNS_DEF.map(c=>({id:c.id, label: settings.colLabels?.[c.id]||c.label}));
  applyBranding();
  closeOv('settingsOv');
  render();
  toast('Settings saved');
}

/* ─── DATA ─── */
function save(){try{localStorage.setItem(KEY_DATA,JSON.stringify(projects));}catch(e){}}
function load(){
  try{
    const r=localStorage.getItem(KEY_DATA);
    if(!r){const o=localStorage.getItem('bvp_projects_v1');if(o){projects=JSON.parse(o);save();return;}}
    if(r)projects=JSON.parse(r);
  }catch(e){projects=[];}
}

function exportData(){
  const b=new Blob([JSON.stringify(projects,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='bvp-projects-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
  toast('Exported '+projects.length+' projects');
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d))throw 0;
      const ex=new Set(projects.map(p=>p.id));
      let n=0;d.forEach(p=>{if(!ex.has(p.id)){projects.push(p);n++;}});
      save();render();toast('Imported '+n+' project'+(n!==1?'s':''));
    }catch(err){toast('Import failed — invalid file');}
  };
  r.readAsText(f);e.target.value='';
}

/* ─── FILTERS ─── */
function toggleFilter(el){
  const f=el.dataset.filter;
  if(activeFilters.has(f)){activeFilters.delete(f);el.classList.remove('active');}
  else{activeFilters.add(f);el.classList.add('active');}
  applyFilters();
}
function applyFilters(){render();}
function getFiltered(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  return projects.filter(p=>{
    if(q){const h=[p.title,p.notes,...(p.tags||[])].join(' ').toLowerCase();if(!h.includes(q))return false;}
    for(const f of activeFilters){
      if(f.startsWith('pri:')&&p.priority!==f.slice(4))return false;
      if(f.startsWith('tag:')&&!(p.tags||[]).includes(f.slice(4)))return false;
    }
    return true;
  });
}

/* ─── RENDER ─── */
function render(){renderStats();renderTagFilters();renderBoard();}

function renderStats(){
  const today=new Date();today.setHours(0,0,0,0);
  const ov=projects.filter(p=>p.dueDate&&new Date(p.dueDate)<today&&p.status!=='done').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat-pill"><span class="stat-dot" style="background:#3d4659"></span>Total <span class="stat-count" style="margin-left:4px">'+projects.length+'</span></div>'+
    COLUMNS.map(col=>{
      const n=projects.filter(p=>p.status===col.id).length;
      if(!n)return'';
      const c=SC[col.id];
      return'<div class="stat-pill"><span class="stat-dot" style="background:'+c.color+'"></span>'+col.label+' <span class="stat-count" style="margin-left:4px">'+n+'</span></div>';
    }).join('')+
    (ov?'<span class="overdue-badge">⚠ '+ov+' Overdue</span>':'');
}

function renderTagFilters(){
  const tags=[...new Set(projects.flatMap(p=>p.tags||[]))].sort();
  document.getElementById('tagFilters').innerHTML=tags.slice(0,7).map(t=>
    '<button class="filter-pill'+(activeFilters.has('tag:'+t)?' active':'')+'" data-filter="tag:'+t+'" onclick="toggleFilter(this)">'+t+'</button>'
  ).join('');
}

function renderBoard(){
  const filtered=getFiltered();
  const board=document.getElementById('board');
  const noRes=document.getElementById('noResults');
  const today=new Date();today.setHours(0,0,0,0);
  const isF=(document.getElementById('searchInput')?.value||'').trim()||activeFilters.size;
  const hasAny=COLUMNS.some(col=>filtered.some(p=>p.status===col.id));
  if(isF&&!hasAny){board.style.display='none';noRes.style.display='block';return;}
  board.style.display='flex';noRes.style.display='none';
  board.innerHTML=COLUMNS.map(col=>{
    const items=filtered.filter(p=>p.status===col.id);
    const cards=items.length?items.map(p=>renderCard(p,col.id,today)).join(''):'<div class="col-empty">No projects</div>';
    return'<div class="col s-'+col.id+'"><div class="col-header"><div class="col-title-row"><div class="col-dot"></div><div class="col-title">'+col.label+'</div></div><div style="display:flex;align-items:center;gap:6px"><div class="col-count">'+items.length+'</div><button class="col-add" onclick="openNew(\''+col.id+'\')" title="Add">+</button></div></div><div class="col-cards">'+cards+'</div></div>';
  }).join('');
}

function renderCard(p,colId,today){
  const tags=(p.tags||[]).map((t,i)=>{const c=TC[i%TC.length];return'<span class="tag" style="background:'+c.bg+';border-color:'+c.border+';color:'+c.text+'">'+t+'</span>';}).join('');
  const pc={high:'pri-high',med:'pri-med',low:'pri-low',none:'pri-none'}[p.priority||'none'];
  const pl={high:'● High',med:'◐ Med',low:'○ Low',none:''}[p.priority||'none'];
  const hasNotes=!!(p.notes&&p.notes.trim());
  const excerpt=p.notes?p.notes.trim().substring(0,105):'';
  const sugs=p.suggestions||[];
  const total=sugs.length,done=sugs.filter(s=>s.done).length;
  const pct=total>0?Math.round(done/total*100):-1;
  const pcolor=PC[p.status]||'#3d4659';
  let dueHtml='',overdueClass='';
  if(p.dueDate){
    const due=new Date(p.dueDate);const diff=Math.round((due-today)/86400000);
    if(diff<0&&p.status!=='done'){overdueClass='overdue';dueHtml='<span class="card-due overdue-text">⚠ '+Math.abs(diff)+'d late</span>';}
    else if(diff===0)dueHtml='<span class="card-due due-soon">Due today</span>';
    else if(diff<=3)dueHtml='<span class="card-due due-soon">'+diff+'d left</span>';
    else dueHtml='<span class="card-due due-ok">'+fmtDate(new Date(p.dueDate).getTime())+'</span>';
  }
  const ci=COLUMNS.findIndex(c=>c.id===colId);
  const prev=ci>0?COLUMNS[ci-1]:null;
  const next=ci<COLUMNS.length-1?COLUMNS[ci+1]:null;
  const qm='<div class="card-quick-actions" onclick="event.stopPropagation()">'+(prev?'<button class="qmove-btn" onclick="quickMove(\''+p.id+'\',\''+prev.id+'\')" title="'+prev.label+'">←</button>':'')+(next?'<button class="qmove-btn" onclick="quickMove(\''+p.id+'\',\''+next.id+'\')" title="'+next.label+'">→</button>':'')+'</div>';
  return'<div class="card '+overdueClass+'" onclick="viewProject(\''+p.id+'\')">'+
    (hasNotes?'<div class="has-notes-dot"></div>':'')+qm+
    '<div class="card-title">'+esc(p.title)+'</div>'+
    (tags?'<div class="card-tags">'+tags+'</div>':'')+
    (excerpt?'<div class="card-excerpt">'+esc(excerpt)+(p.notes.length>105?'…':'')+'</div>':'')+
    (pct>=0?'<div class="progress-wrap"><div class="progress-label"><span style="font-size:9px;color:var(--text3);font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.05em">STEPS</span><span class="progress-pct">'+done+'/'+total+' · '+pct+'%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%;background:'+pcolor+'"></div></div></div>':'')+
    '<div class="card-footer">'+(dueHtml||'<span></span>')+(pl?'<span class="card-priority '+pc+'">'+pl+'</span>':'<span></span>')+'</div></div>';
}

function quickMove(id,ns){
  const p=projects.find(x=>x.id===id);if(!p)return;
  p.status=ns;p.updatedAt=Date.now();save();render();
  toast('→ '+(COLUMNS.find(c=>c.id===ns)?.label||ns));
}

/* ─── EDIT ─── */
function openNew(status){
  editingId=null;suggestions=[];
  document.getElementById('editModalTitle').textContent='New Project';
  document.getElementById('fTitle').value='';
  document.getElementById('fStatus').value=status||'idea';
  document.getElementById('fPriority').value='none';
  document.getElementById('fTags').value='';
  document.getElementById('fDue').value='';
  document.getElementById('fNotes').value='';
  document.getElementById('deleteBtn').style.display='none';
  renderSuggestList();openOv('editOv');
  setTimeout(()=>document.getElementById('fTitle').focus(),120);
}
function openEdit(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  editingId=id;suggestions=JSON.parse(JSON.stringify(p.suggestions||[]));
  document.getElementById('editModalTitle').textContent='Edit Project';
  document.getElementById('fTitle').value=p.title;
  document.getElementById('fStatus').value=p.status;
  document.getElementById('fPriority').value=p.priority||'none';
  document.getElementById('fTags').value=(p.tags||[]).join(', ');
  document.getElementById('fDue').value=p.dueDate||'';
  document.getElementById('fNotes').value=p.notes||'';
  document.getElementById('deleteBtn').style.display='inline-flex';
  renderSuggestList();openOv('editOv');
}
function editFromDetail(){closeOv('detailOv');openEdit(viewingId);}
function saveProject(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){toast('Enter a project title');return;}
  const data={title,status:document.getElementById('fStatus').value,priority:document.getElementById('fPriority').value,tags:document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean),dueDate:document.getElementById('fDue').value||null,notes:document.getElementById('fNotes').value.trim(),suggestions:JSON.parse(JSON.stringify(suggestions))};
  if(editingId){
    const i=projects.findIndex(x=>x.id===editingId);
    if(i>-1)projects[i]={...projects[i],...data,updatedAt:Date.now()};
    toast('Project updated');
  }else{
    data.id='p'+Date.now();data.createdAt=data.updatedAt=Date.now();projects.unshift(data);toast('Project created');
  }
  save();closeOv('editOv');render();
}
function deleteProject(){
  if(!editingId)return;
  if(!confirm('Delete this project? Cannot be undone.'))return;
  projects=projects.filter(x=>x.id!==editingId);
  save();closeOv('editOv');render();toast('Project deleted');
}

/* ─── DETAIL ─── */
function viewProject(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  viewingId=id;
  document.getElementById('detailName').textContent=p.title;
  const sc=SC[p.status];
  const colLabel=COLUMNS.find(c=>c.id===p.status)?.label||p.status;
  const tags=(p.tags||[]).map((t,i)=>{const c=TC[i%TC.length];return'<span class="tag" style="background:'+c.bg+';border-color:'+c.border+';color:'+c.text+';font-size:10px;padding:2px 8px">'+t+'</span>';}).join('');
  const pl={high:'● High Priority',med:'◐ Medium Priority',low:'○ Low Priority',none:''}[p.priority||'none'];
  const pc={high:'pri-high',med:'pri-med',low:'pri-low',none:'pri-none'}[p.priority||'none'];
  const sugs=p.suggestions||[];
  const total=sugs.length,done=sugs.filter(s=>s.done).length;
  const pct=total>0?Math.round(done/total*100):-1;
  const pcolor=PC[p.status]||'#3d4659';
  const today=new Date();today.setHours(0,0,0,0);
  let dueInfo='';
  if(p.dueDate){
    const due=new Date(p.dueDate);const diff=Math.round((due-today)/86400000);
    const ds=due.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    if(diff<0&&p.status!=='done')dueInfo='<span style="color:var(--coral)">⚠ Overdue '+Math.abs(diff)+'d · '+ds+'</span>';
    else if(diff===0)dueInfo='<span style="color:var(--yellow)">Due today · '+ds+'</span>';
    else if(diff<=3)dueInfo='<span style="color:var(--yellow)">'+diff+'d left · '+ds+'</span>';
    else dueInfo='<span style="color:var(--text2)">Due '+ds+'</span>';
  }
  const sitems=sugs.map((s,i)=>'<div class="suggest-item"><div class="suggest-item-check '+(s.done?'done':'')+'" onclick="toggleSugDetail(\''+id+'\','+i+')">'+(s.done?'✓':'')+'</div><div class="suggest-item-text" style="'+(s.done?'text-decoration:line-through;opacity:.45':'')+'">'+esc(s.text)+'</div></div>').join('');
  document.getElementById('detailBody').innerHTML=
    '<div class="detail-meta"><div class="detail-status-badge" style="background:'+sc.bg+';color:'+sc.color+';border:1px solid '+sc.color+'40"><span style="width:6px;height:6px;border-radius:50%;background:'+sc.color+';display:inline-block"></span>'+colLabel+'</div>'+(pl?'<span class="card-priority '+pc+'">'+pl+'</span>':'')+(tags?'<div style="display:flex;flex-wrap:wrap;gap:4px">'+tags+'</div>':'')+(dueInfo?'<div style="font-size:11px;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;letter-spacing:.04em">📅 '+dueInfo+'</div>':'')+'</div>'+
    '<div><div class="section-label">Notes</div><div class="detail-notes">'+esc(p.notes||'—')+'</div></div>'+
    (pct>=0?'<div class="detail-prog-wrap"><div style="display:flex;justify-content:space-between;align-items:center"><div class="section-label" style="margin:0">Progression — '+done+'/'+total+' steps</div><span style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:800;color:'+pcolor+'">'+pct+'%</span></div><div class="detail-prog-bg"><div class="detail-prog-fill" style="width:'+pct+'%;background:'+pcolor+'"></div></div></div>':'')+
    (sugs.length?'<div><div class="section-label">Steps</div><div style="display:flex;flex-direction:column;gap:5px">'+sitems+'</div></div>':'')+
    '<div style="font-size:10px;color:var(--text3);font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.05em">Created '+fmtDate(p.createdAt)+' · Updated '+fmtDate(p.updatedAt)+'</div>';
  openOv('detailOv');
}
function toggleSugDetail(pid,idx){
  const p=projects.find(x=>x.id===pid);if(!p||!p.suggestions[idx])return;
  p.suggestions[idx].done=!p.suggestions[idx].done;
  p.updatedAt=Date.now();save();viewProject(pid);
}

/* ─── SUGGESTIONS ─── */
function renderSuggestList(){
  const list=document.getElementById('suggestList');
  if(!suggestions.length){list.innerHTML='';return;}
  list.innerHTML=suggestions.map((s,i)=>'<div class="suggest-item"><div class="suggest-item-check '+(s.done?'done':'')+'" onclick="toggleSug('+i+')">'+(s.done?'✓':'')+'</div><div class="suggest-item-text" style="'+(s.done?'text-decoration:line-through;opacity:.45':'')+'">'+esc(s.text)+'</div><button class="suggest-item-del" onclick="removeSug('+i+')">✕</button></div>').join('');
}
function addSuggest(){const inp=document.getElementById('suggestInput');const v=inp.value.trim();if(!v)return;suggestions.push({text:v,done:false});inp.value='';renderSuggestList();inp.focus();}
function toggleSug(i){suggestions[i].done=!suggestions[i].done;renderSuggestList();}
function removeSug(i){suggestions.splice(i,1);renderSuggestList();}

async function getAISuggestions(){
  const title=document.getElementById('fTitle').value.trim();
  const notes=document.getElementById('fNotes').value.trim();
  const status=document.getElementById('fStatus').value;
  if(!title){toast('Add a project title first');return;}
  const btn=document.getElementById('aiBtn');
  btn.classList.add('loading');
  document.getElementById('aiBtnText').textContent='Thinking...';
  const colLabel=COLUMNS.find(c=>c.id===status)?.label||status;
  const existing=suggestions.map(s=>s.text).join(', ');
  const prompt='You are a business strategy assistant for BVP (digital products company: AI tools, prompt packs, playbooks).\nProject: "'+title+'"\nStatus: '+colLabel+'\n'+(notes?'Notes: '+notes+'\n':'')+(existing?'Existing steps: '+existing+'\n':'')+'Give exactly 5 concise actionable next steps. No repeats. Max 12 words each. ONLY a JSON array of strings, no markdown, no preamble.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    const steps=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(Array.isArray(steps)){
      let n=0;steps.forEach(s=>{if(!suggestions.find(x=>x.text===s)){suggestions.push({text:s,done:false});n++;}});
      renderSuggestList();toast(n+' suggestions added');
    }
  }catch(e){toast('Could not generate suggestions');}
  btn.classList.remove('loading');
  document.getElementById('aiBtnText').textContent='✦ AI Suggest';
}

/* ─── OVERLAYS ─── */
function openOv(id){
  if(id==='settingsOv'){ openOv_settings(); return; }
  var el=document.getElementById(id);
  if(el) el.classList.add('open');
}
function closeOv(id){
  var el=document.getElementById(id);
  if(el) el.classList.remove('open');
}

/* ─── UTILS ─── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){if(!ts)return'';return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);
}

/* ─── KEYBOARD ─── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeOv('editOv');closeOv('detailOv');closeOv('settingsOv');}
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter')saveProject();
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput')?.focus();}
});
document.getElementById('lockInput').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});

/* ─── INIT ─── */
loadSettings();
load();
applyBranding();

if(isUnlocked()){
  document.getElementById('lockScreen').classList.add('hidden');
  document.getElementById('app').style.display='block';
  render();
} else {
  setTimeout(()=>document.getElementById('lockInput').focus(),200);
}
</script>
